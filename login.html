<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | GIYA</title>
    <link rel="icon" href="/assets/giya-logo.png" type="image/png">
    <link rel="stylesheet" href="/assets/giya-ui.css">
    <link rel="canonical" href="https://joingiya.com/login.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{g:{black:'#0A0A0B',pearl:'#F5F3EE',gold:'#C4A052',slate:{200:'#D1D5DB',600:'#374151'}}}}}}</script>
</head>
<body class="bg-g-pearl min-h-screen font-sans text-g-black flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-g-slate-200 p-8">
        <a href="/" class="giya-brand-link block">
            <img src="/assets/giya-logo.png" alt="GIYA — Guiding Advisors. Protecting Legacies." width="440" height="440" class="giya-logo giya-logo--auth mx-auto" decoding="async">
        </a>
        <h1 class="text-xl font-bold mt-6">Sign in</h1>
        <p class="text-sm text-g-slate-600 mt-1">Access your member tools and saved progress.</p>
        <form id="login-form" class="mt-6 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1" for="email">Email</label>
                <input id="email" type="email" required autocomplete="email" class="w-full border border-g-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-g-gold/40 outline-none min-h-[44px]">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1" for="password">Password</label>
                <input id="password" type="password" required autocomplete="current-password" class="w-full border border-g-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-g-gold/40 outline-none min-h-[44px]">
            </div>
            <p id="error" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-g-black text-white font-bold py-3 rounded-xl hover:bg-g-black/90 min-h-[48px]">Sign in</button>
        </form>
        <p class="text-sm text-g-slate-600 mt-6 text-center">
            New member? <a href="/register.html" class="text-g-gold font-semibold hover:underline">Create free account</a>
        </p>
        <p class="text-sm text-center mt-2"><a href="/" class="text-g-slate-600 hover:text-g-black">← Back to home</a></p>
    </div>
    <script src="/assets/giya-auth.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const emailPrefill = params.get('email') || '';
        if (emailPrefill) document.getElementById('email').value = emailPrefill;

        /** After sign-in, land on homepage hero — not account billing or membership/pricing hashes. */
        function resolveLoginReturn(raw) {
            const exploreHome = '/';
            if (!raw) return exploreHome;
            try {
                const url = new URL(raw, location.origin);
                if (url.origin !== location.origin) return exploreHome;
                if (url.pathname === '/admin/') return '/admin/';
                if (url.pathname === '/account.html' && url.searchParams.get('billing') !== '1') {
                    return exploreHome;
                }
                const blockedHashes = new Set([
                    'academy-pricing',
                    'business-academy',
                    'academy-overview',
                    'academy-curriculum',
                    'academy-tools',
                    'academy-scripts',
                    'giya-plans',
                    'pathways',
                ]);
                if (url.pathname === '/' && blockedHashes.has(url.hash.replace('#', ''))) {
                    return exploreHome;
                }
                if (url.pathname === '/' || url.pathname === '/index.html') {
                    return exploreHome;
                }
                return url.pathname + url.search + url.hash;
            } catch {
                return exploreHome;
            }
        }

        const returnTo = resolveLoginReturn(params.get('return'));

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('error');
            err.classList.add('hidden');
            try {
                const user = await GiyaAuth.login(
                    document.getElementById('email').value.trim(),
                    document.getElementById('password').value
                );
                if (user.role === 'admin') location.replace('/admin/');
                else {
                    if (returnTo === '/') {
                        sessionStorage.setItem('giya_onboarding', JSON.stringify({
                            type: 'signin',
                            email: user.email || '',
                            welcomedAt: Date.now(),
                        }));
                    }
                    location.replace(returnTo);
                }
            } catch (ex) {
                err.textContent = ex.message;
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
